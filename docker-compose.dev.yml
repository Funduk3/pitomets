services:
  app:
    build: ./monolit
    container_name: spring-app
    ports:
      - "8080:8080"
    extra_hosts:
      # ensure host.docker.internal resolves inside Linux containers (Docker Desktop)
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pitomets
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200

      MINIO_URL: http://minio:9000
      PHOTOS_PUBLIC_BASE_URL_IMAGES: http://localhost:9000/pitomets-images
      PHOTOS_PUBLIC_BASE_URL_AVATARS: http://localhost:9000/pitomets-images
      # In dev: send local URLs to moderator so it falls back to base64
      PHOTOS_MODERATION_PUBLIC_BASE_URL_IMAGES: ${PHOTOS_MODERATION_PUBLIC_BASE_URL_IMAGES:-http://localhost:9000/pitomets-images}
      PHOTOS_MODERATION_PUBLIC_BASE_URL_AVATARS: ${PHOTOS_MODERATION_PUBLIC_BASE_URL_AVATARS:-http://localhost:9000/pitomets-images}
      # messenger1 runs separately; from inside Docker use host.docker.internal to reach host-mapped 8081
      MESSENGER_URL: http://host.docker.internal:8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092  # ✅ Внутренний адрес в Docker-сети
    networks:
      - web

  notifications-service:
    build: ./notifications
    container_name: notifications-service
    env_file:
      - .env.dev
    ports:
      - "8082:8080"  # ✅ Исправлено: хост:8082 → контейнер:8080
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pitomets
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      MAIL_HOST: smtp.mail.ru
      MAIL_PORT: 465
      MAIL_USERNAME: help.pitomets_com_real@mail.ru
      MAIL_PASSWORD: 8yAITJ20ultHbzaD7gDN
      MAIL_FROM: help.pitomets_com_real@mail.ru
      MAIL_SMTP_AUTH: true
      MAIL_SMTP_STARTTLS_ENABLE: false
      MAIL_SMTP_SSL_ENABLE: true

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - web

  moderator-service:
    build: ./moderator
    container_name: moderator-service
    env_file:
      - .env.dev
    depends_on:
      kafka:
        condition: service_started
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MODERIUM_API_BASE_URL: https://moderium-ai.ru
      MODERIUM_API_MODE: strong
      MODERIUM_API_WITH_ANIMAL: "true"
    networks:
      - web

  messenger:
    build: ./messenger
    container_name: messenger-app
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-messenger:5432/messenger
      DATABASE_USER: user
      DATABASE_PASSWORD: password
    depends_on:
      postgres-messenger:
        condition: service_healthy
    networks:
      - web

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    networks:
      - web

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - web
