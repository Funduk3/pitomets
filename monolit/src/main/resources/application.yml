spring:
  application:
    name: monolit

  datasource:
    url: jdbc:postgresql://localhost:5432/pitomets
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://elasticsearch:9200}

logging:
  level:
    com.pitomets.monolit: INFO
    com.pitomets.monolit.config.ElasticConfig: DEBUG
    org.springframework.security: DEBUG

jwt:
  secret: "" # todo dev
  access-token-ttl: 1
  refresh-token-ttl: 168

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,httptrace
  endpoint:
    prometheus:
      enabled: true

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: minioadmin
  secret-key: minioadmin
  bucket: my-bucket

messenger:
  # When monolit runs in Docker and messenger1 is published on host port 8081,
  # use host.docker.internal. Override via env MESSENGER_URL if needed.
  url: ${MESSENGER_URL:http://host.docker.internal:8081}