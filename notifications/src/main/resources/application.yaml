server:
  port: 8080

spring:
  application:
    name: notification-service

  # =========================
  # DATABASE
  # =========================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/pitomets}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # =========================
  # KAFKA
  # =========================
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

    consumer:
      group-id: notification-service
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        # Увеличиваем таймауты для дожидания транзакций
        max.poll.interval.ms: 300000      # 5 минут на обработку одного батча
        session.timeout.ms: 45000         # 45 секунд таймаут сессии
        heartbeat.interval.ms: 3000       # heartbeat каждые 3 секунды

        # Настройки десериализации
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.pitomets.notifications.interfaces.messaging.event.NotificationRequestedEvent
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5

    listener:
      ack-mode: record
      missing-topics-fatal: false

  # =========================
  # EMAIL (SMTP)
  # =========================
  # =========================
  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

# =========================
# APPLICATION (CUSTOM)
# =========================
app:
  # Base URL фронтенда для формирования ссылок в письмах
  frontend-url: ${FRONTEND_URL:http://localhost:3001}

  kafka:
    topics:
      notification-send: notification.send
      notification-sent: notification.sent
      notification-failed: notification.failed

  outbox:
    publish-rate-ms: 1000
    batch-size: 100

  notification:
    retry:
      max-attempts: 3

# =========================
# LOGGING
# =========================
logging:
  level:
    root: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    com.pitomets.notifications: DEBUG
