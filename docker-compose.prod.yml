services:
  minio:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=(Host(`pitomets.com`) || Host(`www.pitomets.com`)) && PathPrefix(`/media`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=le"
      - "traefik.http.routers.minio.priority=95"
      - "traefik.http.routers.minio.middlewares=minio-strip"
      - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/media"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  monolit:
    image: ${MONOLIT_IMAGE}
    container_name: monolit
    restart: unless-stopped
    environment:
      - PHOTOS_PUBLIC_BASE_URL_IMAGES=${PHOTOS_PUBLIC_BASE_URL_IMAGES}
      - PHOTOS_PUBLIC_BASE_URL_AVATARS=${PHOTOS_PUBLIC_BASE_URL_AVATARS}
      - PHOTOS_MODERATION_PUBLIC_BASE_URL_IMAGES=${PHOTOS_MODERATION_PUBLIC_BASE_URL_IMAGES:-${PHOTOS_PUBLIC_BASE_URL_IMAGES}}
      - PHOTOS_MODERATION_PUBLIC_BASE_URL_AVATARS=${PHOTOS_MODERATION_PUBLIC_BASE_URL_AVATARS:-${PHOTOS_PUBLIC_BASE_URL_AVATARS}}
    env_file:
      - .env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monolit.rule=(Host(`pitomets.com`) || Host(`www.pitomets.com`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.monolit.entrypoints=websecure"
      - "traefik.http.routers.monolit.tls.certresolver=le"
      - "traefik.http.routers.monolit.priority=100"
      - "traefik.http.routers.monolit.middlewares=monolit-strip"
      - "traefik.http.middlewares.monolit-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.monolit.loadbalancer.server.port=8080"

  messenger:
    image: ${MESSENGER_IMAGE}
    container_name: messenger
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx768m -XX:MaxMetaspaceSize=128m
    env_file:
      - .env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.messenger.rule=(Host(`pitomets.com`) || Host(`www.pitomets.com`)) && PathPrefix(`/ws`)"
      - "traefik.http.routers.messenger.entrypoints=websecure"
      - "traefik.http.routers.messenger.tls.certresolver=le"
      - "traefik.http.routers.messenger.priority=90"
      - "traefik.http.services.messenger.loadbalancer.server.port=8081"

  notifications:
    image: ${NOTIFICATIONS_IMAGE}
    container_name: notifications
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx768m -XX:MaxMetaspaceSize=128m
    env_file:
      - .env
      - .env.prod
    networks:
      - web

  moderator:
    image: ${MODERATOR_IMAGE}
    container_name: moderator
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx768m -XX:MaxMetaspaceSize=128m
    env_file:
      - .env
      - .env.prod
    networks:
      - web

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: frontend
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      - JAVA_OPTS=-Xms512m -Xmx768m -XX:MaxMetaspaceSize=128m
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=(Host(`pitomets.com`) || Host(`www.pitomets.com`)) && !PathPrefix(`/api`) && !PathPrefix(`/ws`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
