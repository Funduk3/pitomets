server:
  port: 8080

spring:
  application:
    name: moderator-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: moderator-service
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.pitomets.moderator.interfaces.messaging.event.ModerationRequestedEvent
        spring.json.trusted.packages: "*"

    listener:
      ack-mode: record
      missing-topics-fatal: false

moderator:
  kafka:
    topics:
      moderation-requested: moderation.requested
      moderation-processed: moderation.processed

moderium:
  api:
    base-url: ${MODERIUM_API_BASE_URL:https://moderium-ai.ru}
    token: ${MODERIUM_API_TOKEN:}
    mode: ${MODERIUM_API_MODE:strong}
    with-animal: ${MODERIUM_API_WITH_ANIMAL:true}

logging:
  level:
    root: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    com.pitomets.moderator: DEBUG
