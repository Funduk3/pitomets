name: CI - monolit and messenger (Java, Gradle)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "monolit/**"
      - "messenger/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "monolit/**"
      - "messenger/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            monolit:
              - 'monolit/**'
            messenger:
              - 'messenger/**'
            workflow:
              - '.github/workflows/ci.yml'

      - name: Build dynamic matrix
        id: matrix
        run: |
          entries=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            entries+=('{"service":"monolit","java-version":"25"}')
            entries+=('{"service":"messenger","java-version":"25"}')
          else
            if [ "${{ steps.changes.outputs.monolit }}" = "true" ]; then
              entries+=('{"service":"monolit","java-version":"25"}')
            fi
            if [ "${{ steps.changes.outputs.messenger }}" = "true" ]; then
              entries+=('{"service":"messenger","java-version":"25"}')
            fi
            if [ "${{ steps.changes.outputs.workflow }}" = "true" ] && [ ${#entries[@]} -eq 0 ]; then
              entries+=('{"service":"monolit","java-version":"25"}')
              entries+=('{"service":"messenger","java-version":"25"}')
            fi
          fi

          if [ ${#entries[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json_entries=$(IFS=,; echo "${entries[*]}")
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[${json_entries}]}" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }} (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Cache Gradle directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ matrix.service }}/.gradle
          key: ${{ runner.os }}-${{ matrix.service }}-gradle-${{ hashFiles(format('{0}/**/gradle-wrapper.properties', matrix.service), format('{0}/**/build.gradle*', matrix.service), format('{0}/**/settings.gradle*', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.service }}-gradle-
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ${{ matrix.service }}/gradlew

      - name: Build (without tests)
        working-directory: ${{ matrix.service }}
        run: ./gradlew clean assemble --parallel

      - name: Run tests
        id: tests
        working-directory: ${{ matrix.service }}
        run: ./gradlew test --no-parallel --max-workers=2
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"
          PHOTOS_PUBLIC_BASE_URL: "https://minio.pitomets/objects"

      - name: Upload test results (JUnit XML)
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/**/build/test-results

      - name: Upload test reports (HTML)
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/**/build/reports/tests
