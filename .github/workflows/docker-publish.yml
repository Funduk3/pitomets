name: Docker Publish (Docker Hub)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      monolit: ${{ steps.filter.outputs.monolit }}
      messenger: ${{ steps.filter.outputs.messenger }}
      notifications: ${{ steps.filter.outputs.notifications }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "frontend/**"
            monolit:
              - "monolit/**"
            messenger:
              - "messenger/**"
            notifications:
              - "notifications/**"

  publish-frontend:
    name: Build & Push frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            artshar/frontend:1.0.0
          cache-from: type=registry,ref=artshar/frontend:buildcache
          cache-to: type=registry,ref=artshar/frontend:buildcache,mode=max

  publish-monolit:
    name: Build & Push monolit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.monolit == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./monolit
          file: ./monolit/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            artshar/monolit:1.0.0
          cache-from: type=registry,ref=artshar/monolit:buildcache
          cache-to: type=registry,ref=artshar/monolit:buildcache,mode=max

  publish-messenger:
    name: Build & Push messenger
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.messenger == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./messenger
          file: ./messenger/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            artshar/messenger:1.0.0
          cache-from: type=registry,ref=artshar/messenger:buildcache
          cache-to: type=registry,ref=artshar/messenger:buildcache,mode=max

  publish-notifications:
    name: Build & Push notifications
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.notifications == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./notifications
          file: ./notifications/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            artshar/notifications:1.0.0
          cache-from: type=registry,ref=artshar/notifications:buildcache
          cache-to: type=registry,ref=artshar/notifications:buildcache,mode=max
