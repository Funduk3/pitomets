version: '3.8'

services:
  # Сервис для мессенджера
  messenger-app:
    build:
      context: .  # Контекст сборки (папка с Dockerfile)
    container_name: messenger-app
    ports:
      - "8081:8080"  # Пробрасываем порт 8080 внутри контейнера на 8081 на хосте
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/messenger
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=example
    depends_on:
      - postgres
    networks:
      - messenger-network
    restart: always

  # Сервис для базы данных PostgreSQL
  postgres:
    image: postgres:13
    container_name: messenger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: messenger
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - messenger-network
    restart: always

  # Сервис для миграций
  migrate:
    image: postgres:13
    container_name: messenger-migrate
    command: ["sh", "-c", "psql -h postgres -U postgres -d messenger -f /app/database/migrations"]
    depends_on:
      - postgres
    volumes:
      - ./database/migrations:/app/database/migrations
    networks:
      - messenger-network
    restart: "no"

networks:
  messenger-network:
    driver: bridge

volumes:
  postgres-data:
