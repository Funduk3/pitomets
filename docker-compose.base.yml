services:
  app:
    build: ${MONOLIT_IMAGE}
    container_name: spring-app
    ports:
      - "8080:8080"
    extra_hosts:
      # ensure host.docker.internal resolves inside Linux containers (Docker Desktop)
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pitomets
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200

      MINIO_URL: http://minio:9000
      # messenger1 runs separately; from inside Docker use host.docker.internal to reach host-mapped 8081
      MESSENGER_URL: http://host.docker.internal:8081

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092  # ✅ Внутренний адрес в Docker-сети
    networks:
      - web

  notifications-service:
    build: ./notifications
    container_name: notifications-service
    ports:
      - "8082:8080"  # ✅ Исправлено: хост:8082 → контейнер:8080
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pitomets
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    healthcheck: # ✅ Добавлено
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - web

  messenger:
    image: ${MESSENGER_IMAGE}
    container_name: messenger-app
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-messenger:5432/messenger
      DATABASE_USER: user
      DATABASE_PASSWORD: password
    depends_on:
      postgres-messenger:
        condition: service_healthy
    networks:
      - web

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    networks:
      - web

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - web

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: pitomets
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d pitomets" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  postgres-messenger:
    image: postgres:18-alpine
    container_name: postgres-messenger
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_messenger_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d messenger" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - web

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monolit/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - web

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

    depends_on:
      - prometheus
    networks:
      - web

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - web

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    entrypoint: >
      /bin/sh -c "
        echo '⏳ Ждём готовности MinIO...' && sleep 10 &&
        mc alias set myminio http://minio:9000 minioadmin minioadmin &&
        mc mb myminio/pitomets-images --ignore-existing &&
        mc mb myminio/pitomets-avatars --ignore-existing &&
        mc policy set public myminio/pitomets-images &&
        mc policy set public myminio/pitomets-avatars &&
        echo '✅ Бакеты созданы: pitomets-images, pitomets-avatars'
      "
    networks:
      - web


  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://host.docker.internal:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - web

  kafka-init:
    image: apache/kafka:4.1.1
    depends_on:
      kafka:
        condition: service_started
    entrypoint: [ "/bin/bash", "-c" ]
    command: |
      "
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.send --partitions 3 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.sent --partitions 3 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.failed --partitions 3 --replication-factor 1
      echo 'Topics ready'
      "
    networks:
      - web
  # for testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
        - "1025:1025"  # SMTP server
        - "8025:8025"  # Web UI
    restart: unless-stopped
    networks:
      - web

volumes:
  postgres_main_data:
  postgres_messenger_data:
  es_data:
  minio-data:

networks:
  web:
    external: true